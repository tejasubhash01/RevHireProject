# Server
server.port=8080

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/revhire?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# File upload
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB
file.upload-dir=./uploads/resumes

# JWT (will be used later)
jwt.secret=mySecretKeyForJWTGenerationWithAtLeast32CharactersLong!
jwt.expiration=86400000

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.revhire=DEBUG
