<div class="manage-jobs-container">
  <button class="btn btn-secondary back-btn" (click)="goToDashboard()">← Back to Dashboard</button>
  <h1>Manage Jobs</h1>
  <div *ngIf="loading" class="loading">Loading...</div>
  <div *ngIf="error" class="error">{{ error }}</div>
  <div *ngIf="!loading && jobs.length === 0" class="no-data">You haven't posted any jobs yet.</div>

  <table *ngIf="!loading && jobs.length > 0" class="jobs-table">
    <thead>
      <tr>
        <th>Title</th>
        <th>Status</th>
        <th>Deadline</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let job of jobs">
        <td>{{ job.title }}</td>
        <td>
          <span class="status" [ngClass]="{
            'status-active': getStatus(job) === 'Active',
            'status-closed': getStatus(job) === 'Closed',
            'status-filled': getStatus(job) === 'Filled'
          }">{{ getStatus(job) }}</span>
        </td>
        <td>{{ job.applicationDeadline | date:'mediumDate' }}</td>
        <td class="actions">
          <button (click)="openConfirmModal('close', job.id, job.title)" [disabled]="!job.isActive || job.isFilled" class="btn btn-warning">Close</button>
          <button (click)="openConfirmModal('reopen', job.id, job.title)" [disabled]="job.isActive || job.isFilled" class="btn btn-success">Reopen</button>
          <button (click)="openConfirmModal('markFilled', job.id, job.title)" [disabled]="job.isFilled" class="btn btn-info">Mark Filled</button>
          <button (click)="openConfirmModal('delete', job.id, job.title)" class="btn btn-danger">Delete</button>
          <a [routerLink]="['/employer/jobs', job.id, 'applicants']" class="btn btn-secondary">Applicants</a>
        </td>
      </tr>
    </tbody>
  </table>
</div>


<div class="modal" *ngIf="showConfirmModal" (click)="closeConfirmModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <h3>{{ confirmTitle }}</h3>
    <p>{{ confirmMessage }}</p>
    <div class="modal-actions">
      <button (click)="confirmActionHandler()" class="btn btn-danger">Confirm</button>
      <button (click)="closeConfirmModal()" class="btn btn-secondary">Cancel</button>
    </div>
  </div>
</div>
