<div class="dashboard-container">
  <h1>Employer Dashboard</h1>
  <div class="stats-grid" *ngIf="!loading">
    <div class="stat-card">
      <h3>Total Jobs</h3>
      <p class="stat">{{ stats.totalJobs }}</p>
    </div>
    <div class="stat-card">
      <h3>Active Jobs</h3>
      <p class="stat">{{ stats.activeJobs }}</p>
    </div>
    <div class="stat-card">
      <h3>Total Applications</h3>
      <p class="stat">{{ stats.totalApplications }}</p>
    </div>
    <div class="stat-card">
      <h3>Pending Reviews</h3>
      <p class="stat">{{ stats.pendingReviews }}</p>
    </div>
  </div>
  <div *ngIf="loading">Loading...</div>
  <div *ngIf="error" class="error">{{ error }}</div>
</div>

<div class="dashboard-actions">
  <a routerLink="/employer/view-profile" class="profile-link">View Profile</a>
  <a routerLink="/employer/profile" class="profile-link">Edit Profile</a>
  <a routerLink="/employer/post-job" class="post-job-link">Post a New Job</a>
  <a routerLink="/employer/manage-jobs" class="manage-jobs-link">Manage Jobs</a>
</div>
